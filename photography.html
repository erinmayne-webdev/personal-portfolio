<main class="photography-container">
    <header class="page-title">
        <h1>Photography by Erin</h1>

    <div class="album-grid">
        
        <div class="album" data-gallery="nature"> <!-- Nature ALBUM COVER IMAGE -->

        <div class="album" data-gallery="pets"> <!-- Pets ALBUM COVER IMAGE -->

<!-- GALLERY MODAL -->
<div id="galleryModal" class="modal"> 
    <div class="modal-content">
        <button id="closeModal" class="close-button" aria-label="Close gallery">&times;</button> <!-- CLOSE MODAL BUTTON -->
        <button class="prev" aria-label="Previous image">&#10094;</button> <!-- PREVIOUS SLIDE BUTTON -->

        <img id="modalImage" src="" alt="Gallery Image">
        <button class="next" aria-label="Next image">&#10095;</button> <!-- NEXT SLIDE BUTTON -->

</div>
